# Nixpacks configuration for Railway deployment
# Ensures FFmpeg is available for video processing

[phases.setup]
nixPkgs = ["ffmpeg"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
