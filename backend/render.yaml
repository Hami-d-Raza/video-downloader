services:
  - type: web
    name: video-downloader-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FRONTEND_URL
        sync: false
    disk:
      name: downloads
      mountPath: /opt/render/project/src/downloads
      sizeGB: 1
